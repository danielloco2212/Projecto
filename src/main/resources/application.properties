spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# CONFIGURACIÓN DEL POOL DE CONEXIONES (HikariCP)
# Número máximo de conexiones reales que se mantendrán abiertas
spring.datasource.hikari.maximum-pool-size=10
# Tiempo mínimo que una conexión puede estar inactiva en el pool antes de ser retirada
spring.datasource.hikari.idle-timeout=30000
# Tiempo máximo que el pool esperará por una conexión disponible antes de lanzar error
spring.datasource.hikari.connection-timeout=20000
# Tiempo de vida máximo de una conexión en el pool
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Permitir que SwingUI y LoginUI se referencien mutuamente
spring.main.allow-circular-references=true