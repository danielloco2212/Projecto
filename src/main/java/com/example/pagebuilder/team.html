<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${team.name} + ' - ' + ${club.name}">Detalle Equipo</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #71d7f1;
            --sidebar-bg: #1a1c1e;
            --text-light: #ecf0f1;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-color);
        }
        .sidebar {
            width: 280px;
            height: 100vh;
            background-color: var(--sidebar-bg);
            color: white;
            position: fixed;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
        }
        .sidebar-header img {
            max-width: 60px;
            background: white;
            padding: 5px;
            border-radius: 50%;
        }
        .sidebar-nav a {
            display: block;
            padding: 15px 25px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background-color: #2c2f33;
            color: var(--accent-color);
            padding-left: 35px;
        }
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 40px;
        }
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .member-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding-bottom: 15px;
        }
        .member-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .member-card h3 { margin: 15px 0 5px 0; font-size: 1.1rem; }
        .member-card p { color: #7f8c8d; margin: 0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <img th:src="${club.logoUrl}" alt="Logo">
        </div>
        <nav class="sidebar-nav">
            <a href="/">🏠 Inicio</a>
            <div style="padding: 10px 25px; color: #666; font-size: 0.8rem;">EQUIPOS</div>
            <a th:each="t : ${teams}" 
               th:href="@{'/team/' + ${t.id}}" 
               th:text="${t.name}"
               th:classappend="${t.id == team.id} ? 'active' : ''">Equipo</a>
        </nav>
    </aside>

    <main class="main-content">
        <h1 th:text="${team.name}">Nombre del Equipo</h1>
        <p th:text="${team.category}">Categoría</p>

        <div class="members-grid">
            <div th:each="m : ${team.members}" class="member-card">
                <img th:src="${m.photoUrl != null && !m.photoUrl.isEmpty() ? m.photoUrl : 'https://via.placeholder.com/200x200?text=Sin+Foto'}" alt="Foto">
                <h3 th:text="${m.name}">Nombre</h3>
                <p th:text="${m.role}">Rol</p>
            </div>
        </div>
    </main>
</body>
</html>
