<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${club.name}">Club de Baloncesto</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #71d7f1;
            --sidebar-bg: #1a1c1e;
            --text-light: #ecf0f1;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-color);
        }
        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            height: 100vh;
            background-color: var(--sidebar-bg);
            color: white;
            position: fixed;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.2);
        }
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .sidebar-header img {
            max-width: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
            background: white;
            padding: 5px;
        }
        .sidebar-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--accent-color);
        }
        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
        }
        .sidebar-nav a {
            display: block;
            padding: 15px 25px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1rem;
            border-left: 4px solid transparent;
        }
        .sidebar-nav a:hover {
            background-color: #2c2f33;
            color: var(--accent-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 35px;
        }
        .nav-label {
            padding: 10px 25px;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
        }
        /* Content Styling */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 40px;
        }
        .news-card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <img th:src="${club.logoUrl}" alt="Logo">
            <h2 th:text="${club.name}">Mi Club</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="/">🏠 Inicio</a>
            <div class="nav-label">Equipos</div>
            <a th:each="t : ${teams}" 
               th:href="@{'/team/' + ${t.id}}" 
               th:text="'🏀 ' + ${t.name}">Equipo</a>
        </nav>
    </aside>

    <main class="main-content">
        <h1 th:text="${club.name}">Nombre del Club</h1>

        <!-- Sección del Directo de YouTube -->
        <section th:if="${club.youtubeLiveUrl != null and !club.youtubeLiveUrl.isEmpty()}">
            <h2>PARTIDO EN DIRECTO / ÚLTIMO PARTIDO</h2>
            <div class="video-container">
                <iframe th:src="${#strings.replace(club.youtubeLiveUrl, 'watch?v=', 'embed/?v=')}" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen></iframe>
            </div>
            <hr style="margin: 40px 0; border: 0; border-top: 2px solid var(--accent-color); opacity: 0.3;">
        </section>

        <h2>Últimas Noticias</h2>
        <div th:each="post : ${posts}" class="news-card">
            <h2 th:text="${post.title}">Título</h2>
            <div th:utext="${post.content}">Contenido HTML</div>
        </div>
    </main>
</body>
</html>
