<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${team.name}">Equipo</title>
    <style>
        .container { display: flex; flex-direction: column; }
        header { display: flex; align-items: center; padding: 10px 40px; gap: 20px; transition: 0.3s; }
        header a { display: flex; align-items: center; gap: 20px; text-decoration: none; color: inherit; }
        header h1 { margin: 0; font-size: 2rem; }
        .main-layout { display: grid; grid-template-columns: 200px 1fr 200px; gap: 20px; padding: 20px; }
        .sidebar { background: #1a1c1e; padding: 20px 10px; border-radius: 15px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .sidebar h3 { font-size: 0.8rem; text-transform: uppercase; color: #71d7f1; margin: 20px 0 10px 15px; letter-spacing: 1px; }
        .sidebar a {
            display: block;
            padding: 12px 15px;
            margin: 5px 10px 10px 10px;
            background: #2c3e50;
            color: #ecf0f1;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }
        .sidebar a:hover {
            background: #71d7f1;
            color: #1a1c1e;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(113, 215, 241, 0.4);
        }
        .content { min-height: 400px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .social-bar { background: #1a1c1e; padding: 20px 10px; border-radius: 15px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .social-bar h3 { font-size: 0.8rem; text-transform: uppercase; color: #71d7f1; margin: 0 0 15px 0; letter-spacing: 1px; }
        .social-link {
            display: block;
            padding: 12px 15px;
            margin: 5px 10px 10px 10px;
            background: #2c3e50;
            color: #ecf0f1;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .social-link:hover { transform: scale(1.05); filter: brightness(1.2); }
        .social-link.fb:hover { background: #3b5998; box-shadow: 0 4px 12px rgba(59, 89, 152, 0.4); }
        .social-link.ig:hover { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); box-shadow: 0 4px 12px rgba(225, 48, 108, 0.4); }
        .social-link.tw:hover { background: #1da1f2; box-shadow: 0 4px 12px rgba(29, 161, 242, 0.4); }
        img.logo { width: 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ddd; padding: 10px; text-align: center; background: #fdfdfd; border-radius: 8px; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .role { color: #666; font-size: 0.9em; }
    </style>
</head>
<body th:style="'background-image: url(' + ${club.backgroundImageUrl} + '); background-attachment: fixed; background-size: cover; background-position: center;'">
    <div class="container">
        <header th:style="'background-color:' + ${club.headerBackgroundColor} + '; color:' + ${club.headerTextColor}">
            <a href="/">
                <img th:src="${club.logoUrl}" class="logo" alt="Logo">
                <h1 th:text="${club.name}">Nombre del Club</h1>
            </a>
        </header>

        <div class="main-layout">
            <!-- IZQUIERDA: Menú -->
            <nav class="sidebar">
                <h3>Navegación</h3>
                <a href="/">🏠 Inicio</a>
                
                <h3>Equipos</h3>
                <a th:each="t : ${teams}" 
                   th:href="@{'/team/' + ${t.id}}" 
                   th:text="'🏀 ' + ${t.name}"></a>
            </nav>

            <!-- CENTRO: Plantilla -->
            <main class="content">
                <h2 th:text="'Plantilla - ' + ${team.name}">Plantilla</h2>
                <div class="grid">
                    <div class="card" th:each="m : ${team.members}">
                        <img th:src="${m.photoUrl}" alt="Foto">
                        <h3 th:text="${m.name}">Nombre</h3>
                        <p class="role" th:text="${m.role}">Rol</p>
                    </div>
                </div>
            </main>

            <!-- DERECHA: Redes Sociales -->
            <aside class="social-bar">
                <h3>Síguenos</h3>
                <a th:if="${club.facebook}" th:href="${club.facebook}" class="social-link fb">🔵 Facebook</a>
                <a th:if="${club.instagram}" th:href="${club.instagram}" class="social-link ig">📸 Instagram</a>
                <a th:if="${club.twitter}" th:href="${club.twitter}" class="social-link tw">🐦 Twitter</a>
            </aside>
        </div>
    </div>
</body>
</html>
